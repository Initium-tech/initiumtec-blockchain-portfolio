<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- CONCHO coin icon — mascot: el sapo concho, the Puerto Rican crested
       toad (Peltophryne lemur), PR's only native toad, endangered. -->
  <defs>
    <radialGradient id="gold" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ffe89a"/>
      <stop offset="55%" stop-color="#f5b93c"/>
      <stop offset="100%" stop-color="#c97f10"/>
    </radialGradient>
    <path id="arcBottom" d="M 96 256 A 160 160 0 0 0 416 256" fill="none"/>
  </defs>

  <!-- coin body + rim -->
  <circle cx="256" cy="256" r="248" fill="#a3660a"/>
  <circle cx="256" cy="256" r="236" fill="url(#gold)"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#a3660a" stroke-width="10"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#ffe89a" stroke-width="3" opacity="0.7"/>

  <!-- el sapo concho -->
  <text x="256" y="248" font-size="200" text-anchor="middle" dominant-baseline="central">🐸</text>

  <!-- name arc -->
  <text font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900"
        fill="#7a4b06" letter-spacing="6">
    <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">CONCHO</textPath>
  </text>
</svg>
